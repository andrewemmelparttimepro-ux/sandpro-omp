project_id = "sandpro-omp"

[auth]
site_url = "https://objectivetracker.net"
additional_redirect_urls = [
  "https://objectivetracker.net",
  "https://objectivetracker.net/**",
  "https://www.objectivetracker.net",
  "https://www.objectivetracker.net/**",
  "http://localhost:3000",
  "http://localhost:3000/**",
  "http://127.0.0.1:3000",
  "http://127.0.0.1:3000/**"
]

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600
